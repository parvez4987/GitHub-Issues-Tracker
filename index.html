<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">
    <div id="spinner" class="fixed inset-0 bg-white/80 z-[100] flex-col items-center justify-center hidden">
        <div class="loader mb-4"></div>
        <p class="text-[#5832FA] font-bold">Loading data...</p>
    </div>


    <div id="login-page" class="flex flex-col items-center justify-center flex-grow">
        <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md text-center border">
            <img src="assets/github-logo.png" alt="GitHub Logo" class="w-14 h-14 mb-4 mx-auto">
            <h1 class="text-2xl font-bold mb-1">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-sm mb-6">Sign in to track your issues</p>
            
            <form id="login-form" class="space-y-4 text-left">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
                    <input type="text" id="username" class="w-full border rounded-lg p-2.5 focus:outline-none focus:ring-2 focus:ring-[#5832FA]" placeholder="Enter username" value="admin">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" class="w-full border rounded-lg p-2.5 focus:outline-none focus:ring-2 focus:ring-[#5832FA]" placeholder="Enter password" value="admin123">
                </div>
                <button type="submit" class="w-full bg-[#5832FA] text-white font-bold py-3 rounded-lg hover:bg-purple-700 transition">Sign In</button>
            </form>
            <hr>
            <div class="mt-6 border-t pt-4">
                <p class="text-xs text-gray-400 mb-2 font-semibold uppercase">Demo Credentials</p>
                <div class="bg-gray-100 p-3 rounded-lg text-sm text-gray-700 text-center">
                    <p>Username: <strong>admin</strong></p>
                    <p>Password: <strong>admin123</strong></p>
                </div>
            </div>
            <p id="login-error" class="text-red-500 text-sm mt-3 hidden font-semibold">Invalid credentials. Try again.</p>
        </div>
    </div>


    <div id="dashboard-page" class="flex-grow flex flex-col">
        <nav class="bg-white border-b px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <img src="assets/github-logo.png" alt="GitHub Logo" class="w-7 h-7">
                <span class="font-bold text-lg">GitHub Issues Tracker</span>
            </div>
            <div class="flex items-center gap-2 w-full md:w-auto">
                <input type="text" id="search-input" placeholder="Search issues..." class="border rounded-lg px-4 py-2 w-full md:w-64 focus:outline-none focus:ring-2 focus:ring-[#5832FA]">
                <button id="search-btn" class="bg-[#5832FA] text-white px-5 py-2 rounded-lg font-semibold hover:bg-purple-700 transition">Search</button>
            </div>
        </nav>

        <main class="p-6 max-w-7xl mx-auto w-full flex-grow">
            <div class="flex gap-2 mb-6 border-b pb-4">
                <button class="tab-btn active px-6 py-1.5 rounded-full border text-sm font-bold transition bg-[#5832FA] text-white border-[#5832FA]" data-filter="All">All</button>
                <button class="tab-btn px-6 py-1.5 rounded-full border text-sm font-bold transition bg-white text-gray-500 hover:text-gray-800" data-filter="open">Open</button>
                <button class="tab-btn px-6 py-1.5 rounded-full border text-sm font-bold transition bg-white text-gray-500 hover:text-gray-800" data-filter="closed">Closed</button>
            </div>

            <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm border">
                <div class="flex items-center gap-2">
                    <img src="assets/Aperture.png" alt="Issues Icon" class="w-5 h-5">
                    <span class="font-bold"><span id="issue-count">0</span> Issues</span>
                    <span class="text-gray-500 text-sm">found in the repository</span>
                </div>
                <div class="text-sm font-bold flex gap-4">
                    <span class="text-[#22C55E] flex items-center gap-1.5">
                        <img src="assets/Open-Status.png" alt="Open" class="w-4 h-4"> Open
                    </span>
                    <span class="text-[#A855F7] flex items-center gap-1.5">
                        <img src="assets/Closed- Status .png" alt="Closed" class="w-4 h-4"> Closed
                    </span>
                </div>
            </div>

            <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            </div>
        </main>
    </div>


    <script src="script.js"></script>
</body>
</html>
